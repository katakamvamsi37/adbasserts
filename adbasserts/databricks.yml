# Declarative Automation Bundle configuration, more info here: https://docs.databricks.com/en/dev-tools/bundles/settings.html
bundle:
  name: "adbasserts"

include:
  - src/*.yml
  - src/env/*.yml
  - resources/Jobs/*.yml
  - resources/Notebooks/*.yml
  - resources/Pipelines/*.yml

permissions: 
  - group_name: dataengineer_team
    level : CAN_MANAGE

targets:
  # The 'dev' target, for development purposes. This target is the default.
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-aef068b2-51b0.cloud.databricks.com
  qa:
    default : false
    workspace:
      host : https://dbc-aef068b2-51b0.cloud.databricks.com
  # The 'prod' target, used for production deployment.
  prod:
    mode: production
    workspace:
      host: https://dbc-aef068b2-51b0.cloud.databricks.com
      # We always use /Users/katakamvamsi37@gmail.com for all resources to make sure we only have a single copy.
      root_path: /Users/katakamvamsi37@gmail.com/.bundle/${bundle.name}/${bundle.target}
    run_as:
      # This runs as katakamvamsi37@gmail.com in production. We could also use a service principal here,
      # see https://docs.databricks.com/dev-tools/bundles/permissions.html.
      user_name: katakamvamsi37@gmail.com
